name: Build wheels

on:
  push:
    branches:
      - main
    tags:
      # Only publish proper PEP 440 version tags. Final releases (0.8.0) and
      # release candidates (0.8.0rc1) build + publish; anything else is ignored.
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+rc[0-9]+'
  pull_request:
  workflow_dispatch:

concurrency:
  group: wheels-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build_wheels:
    name: Wheels ${{ matrix.os }} ${{ matrix.cibw_archs }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (manylinux)
          - os: ubuntu-latest
          # Linux aarch64 (native ARM runner -- no QEMU)
          - os: ubuntu-24.04-arm
          # macOS Apple Silicon (arm64, native)
          - os: macos-14
            cibw_archs: arm64
            cmake_osx_architectures: arm64
            macosx_deployment_target: "14.0"
          # macOS Intel (x86_64), cross-compiled on the Apple Silicon runner so
          # we don't depend on the scarce/slow macos-13 Intel runners. clang
          # cross-compiles x86_64 fine; the x86_64 test run (Rosetta) is skipped.
          - os: macos-14
            cibw_archs: x86_64
            cmake_osx_architectures: x86_64
            macosx_deployment_target: "13.0"
          # Windows x86_64 (AMD64 only -- no 32-bit win32 wheels, which are in
          # cibuildwheel's Windows `auto` set by default)
          - os: windows-latest
            cibw_archs: AMD64
          # Windows on ARM (best effort)
          - os: windows-11-arm
            cibw_archs: ARM64

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so miniver can derive the version.
          fetch-depth: 0

      - name: Compute version string
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            # On a tag build, pin the version to the *pushed* tag. `git describe`
            # is ambiguous when several tags share a commit (e.g. 0.8.0,
            # 0.8.0rc2, 0.8.0rc3 all on one commit) and would otherwise label
            # the wheels with the wrong tag. The "-0-g<sha>" suffix is the
            # `git describe --long` shape miniver expects (distance 0 => the
            # version is exactly the tag).
            echo "OJPH_GIT_DESCRIBE=${GITHUB_REF_NAME}-0-g$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          else
            echo "OJPH_GIT_DESCRIBE=$(git describe --tags --long --always)" >> "$GITHUB_ENV"
          fi

      - name: Install CMake and Ninja (host)
        # The manylinux container gets these via pip in CIBW before-all; on the
        # macOS/Windows hosts we install them here (covers Windows/ARM64 too).
        if: runner.os != 'Linux'
        uses: lukka/get-cmake@latest

      - name: Set up MSVC developer environment
        # So the OpenJPH CMake/Ninja build uses cl.exe (matching the extension's
        # MSVC toolchain/ABI) for the wheel's target architecture.
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.cibw_archs == 'ARM64' && 'arm64' || 'amd64' }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs || 'auto' }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target }}
          # Target arch for the macOS OpenJPH build so it matches the extension
          # (enables cross-compiling the x86_64 wheel on Apple Silicon). Ignored
          # off macOS.
          CMAKE_OSX_ARCHITECTURES: ${{ matrix.cmake_osx_architectures }}

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ matrix.cibw_archs || 'auto' }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version string
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            # On a tag build, pin the version to the *pushed* tag. `git describe`
            # is ambiguous when several tags share a commit (e.g. 0.8.0,
            # 0.8.0rc2, 0.8.0rc3 all on one commit) and would otherwise label
            # the wheels with the wrong tag. The "-0-g<sha>" suffix is the
            # `git describe --long` shape miniver expects (distance 0 => the
            # version is exactly the tag).
            echo "OJPH_GIT_DESCRIBE=${GITHUB_REF_NAME}-0-g$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          else
            echo "OJPH_GIT_DESCRIBE=$(git describe --tags --long --always)" >> "$GITHUB_ENV"
          fi

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Only on version-tag pushes. The `on.push.tags` filter already restricts
    # this to X.Y.Z / X.Y.ZrcN tags, so any tag reaching here is publishable.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      # pypa/gh-action-pypi-publish generates PEP 740 attestations by default,
      # which requires an OIDC token. Without this the publish fails with
      # "OIDC token retrieval failed ... the ACTIONS_ID_TOKEN_REQUEST_TOKEN
      # environment variable was unset". Also enables Trusted Publishing.
      id-token: write
      # Needed to create/update the GitHub Release for the tag.
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Classify tag (release vs release candidate)
        id: classify
        shell: bash
        run: |
          # PyPI/PEP 440 treats an ``rc`` version as a pre-release automatically
          # (pip skips it unless --pre). We mirror that on the GitHub Release by
          # marking rc tags as pre-releases.
          if [[ "${GITHUB_REF_NAME}" == *rc* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}
          print-hash: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Mark release candidates (rc tags) as GitHub pre-releases.
          prerelease: ${{ steps.classify.outputs.prerelease }}
          # Attach the built wheels and sdist to the release.
          files: dist/*
          generate_release_notes: true
